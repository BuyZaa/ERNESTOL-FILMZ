<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ernestol Films</title>

  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<header>
  <div class="logo">🎬 ERNESTOL FILMS</div>
  <nav>
    <a href="#home">Home</a>
    <a href="#movies">Movies</a>
    <a href="#contact">Book</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <div class="hero-content">
    <h1>Luxury Cinematic Films</h1>
    <p>Weddings • Events • Commercials</p>
    <button onclick="scrollToMovies()">Watch Films</button>
  </div>
</section>

<!-- MOVIES NETFLIX STYLE -->
<section id="movies" class="section">

  <h2>Featured Films</h2>

  <div class="row">
    <h3>Weddings</h3>
    <div class="row-posters">

      <div class="poster" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
        <img src="https://picsum.photos/300/200?1">
      </div>

      <div class="poster" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
        <img src="https://picsum.photos/300/200?2">
      </div>

    </div>
  </div>

  <div class="row">
    <h3>Events</h3>
    <div class="row-posters">

      <div class="poster" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
        <img src="https://picsum.photos/300/200?3">
      </div>

      <div class="poster" onclick="playVideo('https://www.youtube.com/embed/tgbNymZ7vqY')">
        <img src="https://picsum.photos/300/200?4">
      </div>

    </div>
  </div>

</section>

<!-- BOOKING -->
<section id="contact" class="section">
  <h2>Book Now</h2>

  <form action="https://formspree.io/f/mnjlvjqb" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <textarea name="message" placeholder="Project Details"></textarea>
    <button type="submit">Send Booking</button>
  </form>

  <p>📧 ernestolannest@gmail.com</p>
  <p>📞 0781706928</p>
</section>

<!-- VIDEO MODAL -->
<div id="modal" class="modal">
  <span class="close" onclick="closeVideo()">&times;</span>
  <iframe id="videoFrame" src="" frameborder="0" allowfullscreen></iframe>
</div>

<!-- PAYMENT POPUP -->
<div id="paywall" class="paywall">
  <h2>🔒 Premium Content</h2>
  <p>Pay Mobile Money to watch</p>
  <button onclick="pay()">Pay 5000 RWF</button>
  <button onclick="closePaywall()">Cancel</button>
</div>

<script>
let selectedVideo="";

function playVideo(url){
  if(localStorage.getItem("paid")==="yes"){
    document.getElementById("videoFrame").src=url;
    document.getElementById("modal").style.display="flex";
  }else{
    selectedVideo=url;
    document.getElementById("paywall").style.display="flex";
  }
}

function closeVideo(){
  document.getElementById("modal").style.display="none";
  document.getElementById("videoFrame").src="";
}

function pay(){
  alert("Send Mobile Money to 0781706928");
  localStorage.setItem("paid","yes");
  document.getElementById("paywall").style.display="none";
  playVideo(selectedVideo);
}

function closePaywall(){
  document.getElementById("paywall").style.display="none";
}

function scrollToMovies(){
  document.getElementById("movies").scrollIntoView({behavior:"smooth"});
}
</script>

</body>
</html>
